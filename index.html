<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fórum de EPIs — SST</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',sans-serif;background:#f0f4f8;color:#222}
  header{background:linear-gradient(135deg,#1a3c5e,#2d6a9f);color:white;padding:20px 30px;display:flex;align-items:center;gap:15px}
  header h1{font-size:1.6rem}
  header p{font-size:.9rem;opacity:.85;margin-top:3px}
  .shield{font-size:2.2rem}
  main{max-width:1100px;margin:30px auto;padding:0 20px}
  .card{background:white;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.1);padding:24px;margin-bottom:28px}
  .card h2{font-size:1.1rem;color:#1a3c5e;margin-bottom:18px;display:flex;align-items:center;gap:8px}
  .form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
  .form-group label{display:block;font-size:.78rem;font-weight:600;color:#555;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
  .form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 11px;border:1px solid #d0d7e2;border-radius:7px;font-size:.9rem;background:#f8fafc;transition:border .2s}
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#2d6a9f;background:white}
  .form-group.full{grid-column:1/-1}
  .form-group textarea{resize:vertical;min-height:70px}
  .btn-add{margin-top:18px;padding:11px 28px;background:#2d6a9f;color:white;border:none;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer;transition:background .2s}
  .btn-add:hover{background:#1a3c5e}
  .btn-add:disabled{background:#aaa;cursor:not-allowed}
  .forum-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .forum-header h2{font-size:1.1rem;color:#1a3c5e}
  .badge{background:#2d6a9f;color:white;border-radius:20px;padding:3px 12px;font-size:.82rem;font-weight:600}
  .epi-item{background:white;border-radius:10px;border-left:5px solid #2d6a9f;box-shadow:0 1px 6px rgba(0,0,0,.07);padding:18px 20px;margin-bottom:16px;transition:box-shadow .2s}
  .epi-item:hover{box-shadow:0 4px 16px rgba(0,0,0,.12)}
  .epi-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .epi-title{font-size:1rem;font-weight:700;color:#1a3c5e}
  .epi-code{font-size:.78rem;color:#888;font-family:monospace;margin-top:2px}
  .btn-del{background:#e74c3c;color:white;border:none;border-radius:6px;padding:6px 14px;font-size:.82rem;cursor:pointer;white-space:nowrap;transition:background .2s;flex-shrink:0}
  .btn-del:hover{background:#c0392b}
  .epi-fields{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
  .field-chip{background:#eef3f9;border-radius:6px;padding:5px 11px;font-size:.81rem;display:flex;flex-direction:column}
  .field-chip span.label{font-size:.68rem;color:#888;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
  .field-chip span.val{font-weight:600;color:#333;margin-top:1px}
  .risco-chip{border-left:3px solid #e67e22}
  .obs-box{margin-top:12px;padding:10px 13px;background:#fffbea;border-radius:7px;border:1px solid #f0d070}
  .obs-box .label{font-size:.7rem;color:#b8860b;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
  .obs-box p{font-size:.85rem;color:#555;margin-top:3px}
  .comment-section{margin-top:14px;border-top:1px solid #eee;padding-top:12px}
  .comment-toggle{background:none;border:none;color:#2d6a9f;font-size:.85rem;cursor:pointer;font-weight:600;display:flex;align-items:center;gap:5px}
  .comments-area{display:none;margin-top:10px}
  .comments-area.open{display:block}
  .comment-item{background:#f6f8fb;border-radius:7px;padding:9px 12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .comment-text{font-size:.85rem;color:#444;flex:1}
  .comment-meta{font-size:.72rem;color:#aaa;margin-top:2px}
  .btn-del-comment{background:none;border:none;color:#e74c3c;cursor:pointer;font-size:1rem;padding:0 4px;flex-shrink:0}
  .comment-form{display:flex;gap:8px;margin-top:8px}
  .comment-form input{flex:1;padding:7px 10px;border:1px solid #d0d7e2;border-radius:7px;font-size:.85rem}
  .comment-form button{padding:7px 15px;background:#2d6a9f;color:white;border:none;border-radius:7px;cursor:pointer;font-size:.85rem}
  .empty-state{text-align:center;padding:40px;color:#aaa;font-size:1rem}
  .toast{position:fixed;bottom:24px;right:24px;background:#1a3c5e;color:white;padding:12px 20px;border-radius:8px;font-size:.9rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
  .toast.show{opacity:1}
  @media(max-width:600px){.form-grid{grid-template-columns:1fr}.epi-fields{gap:7px}}
</style>
</head>
<body>

<header>
  <div class="shield">🦺</div>
  <div>
    <h1>Fórum de EPIs — Equipamentos de Proteção Individual</h1>
    <p>Gerencie, consulte e comente sobre EPIs · Dados persistidos em <code>dados.json</code></p>
  </div>
</header>

<main>
  <div class="card">
    <h2>➕ Cadastrar Novo EPI</h2>
    <div class="form-grid">
      <div class="form-group"><label>Código *</label><input type="text" id="f-codigo" placeholder="Ex: EPI-006"></div>
      <div class="form-group"><label>Nome / Descrição *</label><input type="text" id="f-nome" placeholder="Ex: Luva de Nitrila"></div>
      <div class="form-group"><label>CA / Doc. de Avaliação *</label><input type="text" id="f-ca" placeholder="Ex: CA 12345"></div>
      <div class="form-group"><label>Fabricante</label><input type="text" id="f-fabricante" placeholder="Ex: 3M, Honeywell"></div>
      <div class="form-group"><label>Validade</label><input type="date" id="f-validade"></div>
      <div class="form-group"><label>Tamanho / Cor</label><input type="text" id="f-tamanho" placeholder="Ex: M / Amarelo"></div>
      <div class="form-group"><label>Categoria de Risco</label>
        <select id="f-risco">
          <option value="">-- Selecionar --</option>
          <option>Químico</option><option>Físico</option><option>Biológico</option>
          <option>Ergonômico</option><option>Mecânico</option><option>Radiação</option>
        </select>
      </div>
      <div class="form-group"><label>Lote</label><input type="text" id="f-lote" placeholder="Ex: LT2025-08"></div>
      <div class="form-group"><label>Dias de Revisão</label><input type="number" id="f-revisao" placeholder="Ex: 90" min="1"></div>
      <div class="form-group"><label>Dias de Validade</label><input type="number" id="f-diasvalidade" placeholder="Ex: 365" min="1"></div>
      <div class="form-group full"><label>Observações</label><textarea id="f-obs" placeholder="Informações adicionais..."></textarea></div>
    </div>
    <button class="btn-add" id="btn-salvar" onclick="adicionarEPI()">✔ Adicionar EPI ao Fórum</button>
  </div>

  <div class="card">
    <div class="forum-header">
      <h2>📋 EPIs Cadastrados</h2>
      <span class="badge" id="total-badge">…</span>
    </div>
    <div id="epi-list"><div class="empty-state">⏳ Carregando...</div></div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
const API = "/api/epis";

function toast(msg, ok=true){
  const t = document.getElementById("toast");
  t.textContent = (ok ? "✅ " : "❌ ") + msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 2800);
}

function fmtDate(d){
  if(!d) return "-";
  const [y,m,day] = d.split("-");
  return `${day}/${m}/${y}`;
}

// ── CARREGAR ──────────────────────────────────────────────────────────────────
async function carregar(){
  const r = await fetch(API);
  const epis = await r.json();
  renderLista(epis);
}

function renderLista(epis){
  const list = document.getElementById("epi-list");
  document.getElementById("total-badge").textContent = epis.length + " item" + (epis.length!==1?"s":"");
  if(!epis.length){ list.innerHTML='<div class="empty-state">📭 Nenhum EPI cadastrado.</div>'; return; }

  list.innerHTML = epis.map(e => {
    const chips = [
      e.ca         ? `<div class="field-chip"><span class="label">CA / Doc</span><span class="val">${e.ca}</span></div>` : "",
      e.fabricante ? `<div class="field-chip"><span class="label">Fabricante</span><span class="val">${e.fabricante}</span></div>` : "",
      e.validade   ? `<div class="field-chip"><span class="label">Validade</span><span class="val">${fmtDate(e.validade)}</span></div>` : "",
      e.tamanho    ? `<div class="field-chip"><span class="label">Tam / Cor</span><span class="val">${e.tamanho}</span></div>` : "",
      e.risco      ? `<div class="field-chip risco-chip"><span class="label">Cat. Risco</span><span class="val">${e.risco}</span></div>` : "",
      e.lote       ? `<div class="field-chip"><span class="label">Lote</span><span class="val">${e.lote}</span></div>` : "",
      e.revisao    ? `<div class="field-chip"><span class="label">Revisão</span><span class="val">${e.revisao} dias</span></div>` : "",
      e.diasvalidade ? `<div class="field-chip"><span class="label">Val. (dias)</span><span class="val">${e.diasvalidade} dias</span></div>` : "",
    ].join("");

    const obsHtml = e.obs ? `<div class="obs-box"><span class="label">📝 Observações</span><p>${e.obs}</p></div>` : "";

    const commentsHtml = e.comentarios.map(c => `
      <div class="comment-item">
        <div>
          <div class="comment-text">${c.texto}</div>
          <div class="comment-meta">📅 ${fmtDate(c.data)}</div>
        </div>
        <button class="btn-del-comment" title="Excluir" onclick="excluirComentario(${e.id},${c.id})">🗑</button>
      </div>`).join("");

    return `
    <div class="epi-item" id="epi-${e.id}">
      <div class="epi-top">
        <div>
          <div class="epi-title">🦺 ${e.nome}</div>
          <div class="epi-code">📌 ${e.codigo}</div>
        </div>
        <button class="btn-del" onclick="excluirEPI(${e.id})">🗑 Excluir</button>
      </div>
      <div class="epi-fields">${chips}</div>
      ${obsHtml}
      <div class="comment-section">
        <button class="comment-toggle" onclick="toggleComments(${e.id})">
          💬 ${e.comentarios.length} comentário${e.comentarios.length!==1?"s":""} ▾
        </button>
        <div class="comments-area" id="comments-${e.id}">
          ${commentsHtml || '<p style="color:#bbb;font-size:.83rem;margin-bottom:8px">Nenhum comentário ainda.</p>'}
          <div class="comment-form">
            <input type="text" id="cinput-${e.id}" placeholder="Adicionar comentário..."
              onkeydown="if(event.key==='Enter') adicionarComentario(${e.id})">
            <button onclick="adicionarComentario(${e.id})">Enviar</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join("");
}

// ── ADICIONAR EPI ─────────────────────────────────────────────────────────────
async function adicionarEPI(){
  const g = id => document.getElementById(id).value.trim();
  const payload = {
    codigo: g("f-codigo"), nome: g("f-nome"), ca: g("f-ca"),
    fabricante: g("f-fabricante"), validade: g("f-validade"),
    tamanho: g("f-tamanho"), risco: g("f-risco"), lote: g("f-lote"),
    revisao: g("f-revisao") ? parseInt(g("f-revisao")) : null,
    diasvalidade: g("f-diasvalidade") ? parseInt(g("f-diasvalidade")) : null,
    obs: g("f-obs")
  };
  if(!payload.codigo||!payload.nome||!payload.ca){
    toast("Preencha Código, Nome e CA.", false); return;
  }
  const btn = document.getElementById("btn-salvar");
  btn.disabled = true; btn.textContent = "Salvando…";
  try {
    const r = await fetch(API, {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(payload)});
    if(!r.ok) throw new Error(await r.text());
    ["f-codigo","f-nome","f-ca","f-fabricante","f-validade","f-tamanho","f-risco","f-lote","f-revisao","f-diasvalidade","f-obs"]
      .forEach(id => document.getElementById(id).value="");
    toast("EPI adicionado com sucesso!");
    carregar();
  } catch(e){ toast("Erro ao salvar: "+e.message, false); }
  finally { btn.disabled=false; btn.textContent="✔ Adicionar EPI ao Fórum"; }
}

// ── EXCLUIR EPI ───────────────────────────────────────────────────────────────
async function excluirEPI(id){
  if(!confirm("Deseja realmente excluir este EPI?")) return;
  const r = await fetch(`${API}/${id}`, {method:"DELETE"});
  if(r.ok){ toast("EPI excluído."); carregar(); }
  else toast("Erro ao excluir.", false);
}

// ── COMENTÁRIOS ───────────────────────────────────────────────────────────────
function toggleComments(id){
  document.getElementById("comments-"+id).classList.toggle("open");
}

async function adicionarComentario(epiId){
  const input = document.getElementById("cinput-"+epiId);
  const texto = input.value.trim();
  if(!texto) return;
  const r = await fetch(`${API}/${epiId}/comentarios`, {
    method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({texto})
  });
  if(r.ok){
    input.value="";
    await carregar();
    setTimeout(()=>{
      const a = document.getElementById("comments-"+epiId);
      if(a) a.classList.add("open");
    },10);
  } else toast("Erro ao comentar.", false);
}

async function excluirComentario(epiId, cid){
  const r = await fetch(`${API}/${epiId}/comentarios/${cid}`, {method:"DELETE"});
  if(r.ok){
    await carregar();
    setTimeout(()=>{
      const a = document.getElementById("comments-"+epiId);
      if(a) a.classList.add("open");
    },10);
  } else toast("Erro ao excluir comentário.", false);
}

// Init
carregar();
</script>
</body>
</html>
